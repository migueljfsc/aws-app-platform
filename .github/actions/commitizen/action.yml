name: Commitizen
description: "Automates semantic versioning and changelog generation using Commitizen"

inputs:
  token:
    description: "GitHub token"
    required: true

outputs:
  version:
    description: "Bumped version"
    value: ${{ steps.cz.outputs.version }}

runs:
  using: "composite"

  steps:
    - id: cz
      name: Create bump and changelog
      uses: commitizen-tools/commitizen-action@338bbd841b75aaee6bf5340e1fa12f6ab58ff9ff # master
      with:
        github_token: ${{ github.token }}
        changelog_increment_filename: body.md

    - name: Release
      uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1
      with:
        tag: ${{ env.REVISION }}
        bodyFile: "body.md"
        skipIfReleaseExists: true
      env:
        GITHUB_TOKEN: ${{ inputs.token }}

    - name: Print Version
      shell: bash
      run: echo "Bumped to version ${{ steps.cz.outputs.version }}"
