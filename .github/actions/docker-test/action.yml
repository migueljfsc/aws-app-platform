name: Docker Test
description: "Pulls a Docker image from Amazon ECR and verifies it starts successfully"

inputs:
  environment:
    description: "The environment"
    required: false
    default: dev
  image-name:
    description: "The image name"
    required: true
  image-tag:
    description: "The image tag to test (defaults to github.sha)"
    required: false
    default: ""
  aws-region:
    description: "The AWS region"
    required: false
    default: eu-west-3

runs:
  using: "composite"

  steps:
    - name: Extract variables
      id: extract-vars
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
      with:
        script: |
          const env = '${{ inputs.environment }}';
          const awsRegion = '${{ inputs.aws-region }}';

          const accountMap = {
            "dev": "123456789012",
            "stg": "123456789012"
          };
          const accountId = accountMap[env] || '';

          const registry = `${accountId}.dkr.ecr.${awsRegion}.amazonaws.com`;

          return {
            accountId: accountId,
            registry: registry
          };

    - name: Authenticate AWS
      uses: aws-actions/configure-aws-credentials@99214aa6889fcddfa57764031d71add364327e59 # v6
      with:
        aws-region: ${{ inputs.aws-region }}
        role-to-assume: arn:aws:iam::${{ fromJSON(steps.extract-vars.outputs.result).accountId }}:role/github-actions-ecr-builder

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@fa648b43de3d4d023bcb3f89ed6940096949c419 # v2

    - name: Pull and test image
      shell: bash
      run: |
        TAG="${{ inputs.image-tag }}"
        if [ -z "$TAG" ]; then
          TAG="${{ github.sha }}"
        fi

        IMAGE="${{ fromJSON(steps.extract-vars.outputs.result).registry }}/${{ inputs.image-name }}:${TAG}"

        echo "Pulling image: ${IMAGE}"
        docker pull "${IMAGE}"

        echo "Starting container..."
        CID=$(docker run -d "${IMAGE}")
        sleep 5

        STATUS=$(docker inspect -f '{{.State.Status}}' "$CID")
        echo "Container status: $STATUS"

        LOGS=$(docker logs "$CID" 2>&1 || true)
        echo "Container logs:"
        echo "$LOGS"

        docker stop "$CID" && docker rm "$CID"

        if [ "$STATUS" != "running" ]; then
          echo "::error::Container exited unexpectedly with status: $STATUS"
          exit 1
        fi

        echo "Container started successfully"
